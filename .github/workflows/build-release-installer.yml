name: Build Release Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  R2_FEED_PREFIX: "surveycontroller/win/stable"
  VELOPACK_CHANNEL: "stable"
  VELOPACK_KEEP_FULL_VERSIONS: "6"

concurrency:
  group: build-release-installer-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build And Publish Installer
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download previous Velopack feed
        shell: powershell
        continue-on-error: true
        run: |
          $channel = "${env:VELOPACK_CHANNEL}"
          $releaseDir = Join-Path "${{ github.workspace }}" "Releases"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          $feedBase = "https://dl.hungrym0.top/${env:R2_FEED_PREFIX}"
          $manifestPath = Join-Path $releaseDir "releases.$channel.json"
          try {
            Invoke-WebRequest -Uri "$feedBase/releases.$channel.json" -OutFile $manifestPath -UseBasicParsing
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $assets = @($manifest.Assets)
            foreach ($asset in $assets) {
              $fileName = [string]$asset.FileName
              if ([string]::IsNullOrWhiteSpace($fileName)) {
                continue
              }
              Invoke-WebRequest -Uri "$feedBase/$fileName" -OutFile (Join-Path $releaseDir $fileName) -UseBasicParsing
            }
            foreach ($extraName in @("assets.$channel.json", "RELEASES-$channel")) {
              try {
                Invoke-WebRequest -Uri "$feedBase/$extraName" -OutFile (Join-Path $releaseDir $extraName) -UseBasicParsing
              } catch {
              }
            }
          } catch {
            Write-Host "No previous feed downloaded: $($_.Exception.Message)"
          }

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13.13"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Python dependencies
        run: |
          uv sync --locked --no-dev --group build

      - name: Show Python and Nuitka version
        shell: powershell
        run: |
          uv run python --version
          uv run python -m nuitka --version

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install Velopack CLI
        shell: powershell
        run: dotnet tool install -g vpk

      - name: Resolve release metadata
        id: release_meta
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $packVersion = $tag.TrimStart('v')
          $channel = "${env:VELOPACK_CHANNEL}"
          $releaseDir = Join-Path "${{ github.workspace }}" "Releases"
          $setupName = "SurveyController_v${packVersion}_setup.exe"
          $setupPath = Join-Path $releaseDir $setupName
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "pack_version=$packVersion" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT
          "release_dir=$releaseDir" >> $env:GITHUB_OUTPUT
          "setup_name=$setupName" >> $env:GITHUB_OUTPUT
          "setup_path=$setupPath" >> $env:GITHUB_OUTPUT

      - name: Verify matching draft release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          $tag = "${{ steps.release_meta.outputs.tag }}"
          $releaseJson = gh release view $tag --json isDraft --repo "${{ github.repository }}" 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($releaseJson)) {
            throw "Missing GitHub Release draft for tag: $tag. Create the draft release first, then push the matching tag."
          }
          $release = $releaseJson | ConvertFrom-Json
          if (-not $release.isDraft) {
            throw "GitHub Release for tag $tag is not a draft. Keep it as a draft until this workflow publishes it."
          }

      - name: Build release installer
        shell: powershell
        run: |
          .\Setup\build-release-installer.ps1 `
            -SkipSync `
            -Channel "${{ steps.release_meta.outputs.channel }}" `
            -PackVersion "${{ steps.release_meta.outputs.pack_version }}" `
            -KeepFullVersions "${env:VELOPACK_KEEP_FULL_VERSIONS}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: velopack-release-assets
          path: ${{ steps.release_meta.outputs.release_dir }}
          if-no-files-found: error

      - name: Upload release assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          $releaseDir = "${{ steps.release_meta.outputs.release_dir }}"
          $packVersion = "${{ steps.release_meta.outputs.pack_version }}"
          $channel = "${{ steps.release_meta.outputs.channel }}"
          $setupName = "${{ steps.release_meta.outputs.setup_name }}"
          $assetNames = @(
            $setupName,
            "SurveyController-$packVersion-$channel-full.nupkg",
            "SurveyController-$packVersion-$channel-delta.nupkg"
          )
          foreach ($assetName in $assetNames) {
            $assetPath = Join-Path $releaseDir $assetName
            if (-not (Test-Path $assetPath)) {
              if ($assetName -like "*-delta.nupkg") {
                Write-Host "Optional delta package not found: $assetName"
                continue
              }
              throw "Release asset not found: $assetPath"
            }
            gh release upload "${{ steps.release_meta.outputs.tag }}" $assetPath --clobber --repo "${{ github.repository }}"
          }

      - name: Normalize R2 endpoint
        id: r2_endpoint
        shell: powershell
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          $raw = "${env:R2_ACCOUNT_ID}"
          $raw = $raw -replace '^https?://', ''
          $raw = $raw.Split('/')[0]
          $raw = $raw -replace '\.r2\.cloudflarestorage\.com$', ''
          if ([string]::IsNullOrWhiteSpace($raw)) {
            throw "R2_ACCOUNT_ID is empty or invalid"
          }
          "endpoint=https://$raw.r2.cloudflarestorage.com" >> $env:GITHUB_OUTPUT

      - name: Ensure AWS CLI is available
        shell: powershell
        run: |
          $aws = Get-Command aws -ErrorAction SilentlyContinue
          if (-not $aws) {
            choco install awscli --yes --no-progress
            $aws = Get-Command aws -ErrorAction SilentlyContinue
          }
          if (-not $aws) {
            throw "aws CLI is not available"
          }
          aws --version

      - name: Upload release feed and packages to R2
        shell: powershell
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_RETRY_MODE: standard
          AWS_MAX_ATTEMPTS: "3"
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          $releaseDir = "${{ steps.release_meta.outputs.release_dir }}"
          Get-ChildItem $releaseDir | ForEach-Object {
            $contentType = "application/octet-stream"
            $cacheControl = "public, max-age=31536000, immutable"
            if ($_.Name -like "releases.*.json") {
              $contentType = "application/json"
              $cacheControl = "no-cache, no-store, must-revalidate"
            } elseif ($_.Extension -eq ".exe") {
              $contentType = "application/vnd.microsoft.portable-executable"
            }
            aws s3 cp $_.FullName "s3://${env:R2_BUCKET}/${env:R2_FEED_PREFIX}/$($_.Name)" `
              --cache-control $cacheControl `
              --content-type $contentType `
              --endpoint-url "${{ steps.r2_endpoint.outputs.endpoint }}"
          }

      - name: Remove old R2 feed assets
        shell: powershell
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_RETRY_MODE: standard
          AWS_MAX_ATTEMPTS: "3"
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          $releaseDir = "${{ steps.release_meta.outputs.release_dir }}"
          $keepNames = New-Object 'System.Collections.Generic.HashSet[string]' ([System.StringComparer]::OrdinalIgnoreCase)
          Get-ChildItem $releaseDir -File | ForEach-Object { [void]$keepNames.Add($_.Name) }
          $listing = aws s3 ls "s3://${env:R2_BUCKET}/${env:R2_FEED_PREFIX}/" --endpoint-url "${{ steps.r2_endpoint.outputs.endpoint }}"
          foreach ($line in $listing) {
            $parts = $line -split '\s+', 4
            if ($parts.Count -lt 4) {
              continue
            }
            $name = $parts[3].Trim()
            if ([string]::IsNullOrWhiteSpace($name)) {
              continue
            }
            if ($keepNames.Contains($name)) {
              continue
            }
            aws s3 rm "s3://${env:R2_BUCKET}/${env:R2_FEED_PREFIX}/$name" --endpoint-url "${{ steps.r2_endpoint.outputs.endpoint }}"
          }

      - name: Upload latest setup alias to R2 root
        shell: powershell
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_RETRY_MODE: standard
          AWS_MAX_ATTEMPTS: "3"
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          $setupPath = "${{ steps.release_meta.outputs.setup_path }}"
          if (-not (Test-Path $setupPath)) {
            throw "Setup installer not found: $setupPath"
          }
          aws s3 cp $setupPath "s3://${env:R2_BUCKET}/SurveyController_latest_setup.exe" `
            --cache-control "no-cache, no-store, must-revalidate" `
            --content-type "application/vnd.microsoft.portable-executable" `
            --endpoint-url "${{ steps.r2_endpoint.outputs.endpoint }}"

      - name: Publish GitHub Release draft
        env:
          GH_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          gh release edit "${{ steps.release_meta.outputs.tag }}" --draft=false --repo "${{ github.repository }}"

      - name: Show release download URLs
        shell: powershell
        run: |
          Write-Host "Release asset:"
          Write-Host "https://github.com/${{ github.repository }}/releases/tag/${{ steps.release_meta.outputs.tag }}"
          Write-Host ""
          Write-Host "Velopack feed:"
          Write-Host "https://dl.hungrym0.top/${env:R2_FEED_PREFIX}/releases.${env:VELOPACK_CHANNEL}.json"
          Write-Host ""
          Write-Host "Setup installer:"
          Write-Host "https://dl.hungrym0.top/${env:R2_FEED_PREFIX}/${{ steps.release_meta.outputs.setup_name }}"
          Write-Host ""
          Write-Host "Latest setup alias:"
          Write-Host "https://dl.hungrym0.top/SurveyController_latest_setup.exe"
