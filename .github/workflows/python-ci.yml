name: Python CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-check:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run compile check
        run: python -m CI.python_checks.compile_check

      - name: Run Ruff check
        run: python -m CI.python_checks.ruff_check

      - name: Run Pyright check
        run: python -m CI.python_checks.pyright_check

      - name: Run unit tests
        run: python -m CI.python_checks.unit_test_check

      - name: Run module import check
        if: ${{ github.event_name != 'push' }}
        run: python -m CI.python_checks.import_check

      - name: Run main window smoke check
        if: ${{ github.event_name != 'push' }}
        run: python -m CI.python_checks.window_smoke_check

      - name: Run live survey parser regression tests
        if: ${{ github.event_name != 'push' }}
        run: python -m unittest CI.live_tests.test_survey_parsers -v
